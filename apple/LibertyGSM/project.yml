# XcodeGen spec — run `xcodegen generate` (on a Mac) to produce LibertyGSM.xcodeproj.
# Two targets: the SwiftUI container app and the packet-tunnel extension it embeds.
# Both link the shared Go core (../LibGSM.xcframework, built by build-xcframework.sh).
name: LibertyGSM

options:
  bundleIdPrefix: com.libertygsm
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.3.0"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.0"
    # Set your team here, or override per-target in Xcode's Signing UI.
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  LibertyGSMApp:
    type: application
    platform: iOS
    sources:
      - path: App
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.libertygsm.app
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/App.entitlements
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - framework: ../LibGSM.xcframework
        embed: true
      - target: PacketTunnel
        embed: true   # embed the extension in the app bundle

  PacketTunnel:
    type: app-extension
    platform: iOS
    sources:
      - path: PacketTunnel
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.libertygsm.app.PacketTunnel
        INFOPLIST_FILE: PacketTunnel/Info.plist
        CODE_SIGN_ENTITLEMENTS: PacketTunnel/PacketTunnel.entitlements
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - framework: ../LibGSM.xcframework
        embed: false   # the host app already embeds it
